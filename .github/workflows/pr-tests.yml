name: PR Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-tests:
    name: Backend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Collect changed source files
        id: changed
        run: |
          FILES=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            | grep '^backend/src/' \
            | grep -v '\.d\.ts$' \
            | sed 's|^backend/||' || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" > /tmp/changed_backend_src.txt
            echo "has_src=true" >> $GITHUB_OUTPUT
          else
            touch /tmp/changed_backend_src.txt
            echo "has_src=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        working-directory: backend
        run: |
          if [ -s /tmp/changed_backend_src.txt ]; then
            COVERAGE_FROM=$(jq -R . /tmp/changed_backend_src.txt | jq -s -c .)
            npx jest --ci --forceExit \
              --coverage \
              --coverageReporters=json-summary \
              --coverageReporters=text \
              --collectCoverageFrom="$COVERAGE_FROM"
          else
            npx jest --ci --forceExit
          fi

      - name: Comment backend coverage on PR
        if: steps.changed.outputs.has_src == 'true'
        uses: MishaKav/jest-coverage-comment@40d7aed38d0fbaea266c34c12ab06356eec894eb # v1.0.33
        with:
          title: Backend coverage (changed files)
          coverage-summary-path: backend/coverage/coverage-summary.json
          unique-id-for-comment: backend

      - name: Enforce 80% coverage on changed files
        if: steps.changed.outputs.has_src == 'true'
        working-directory: backend
        run: |
          FAILED=0
          while IFS= read -r relPath; do
            [ -z "$relPath" ] && continue

            HAS_DATA=$(jq -r --arg p "$relPath" \
              '[to_entries[] | select(.key != "total" and (.key | endswith("/" + $p)))] | length' \
              coverage/coverage-summary.json)

            if [ "$HAS_DATA" = "0" ]; then
              echo "FAIL: $relPath — no coverage data (no tests cover this file)"
              FAILED=1
              continue
            fi

            jq -r --arg p "$relPath" '
              to_entries[] |
              select(.key != "total" and (.key | endswith("/" + $p))) |
              .value |
              to_entries[] |
              select(.value.total > 0 and .value.pct < 80) |
              "FAIL: \($p) — \(.key) \(.value.pct)% < 80%"
            ' coverage/coverage-summary.json | tee /tmp/coverage_fail.txt

            if [ -s /tmp/coverage_fail.txt ]; then
              FAILED=1
            else
              echo "OK: $relPath"
            fi
          done < /tmp/changed_backend_src.txt

          [ "$FAILED" = "0" ] || { echo "Coverage check failed."; exit 1; }
          echo "All changed files meet the 80% coverage threshold."

  frontend-tests:
    name: Frontend Tests + Selenium
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Collect changed source files
        id: changed
        run: |
          FILES=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            | grep '^frontend/' \
            | grep -E '\.(ts|tsx)$' \
            | grep -v '__tests__' \
            | grep -v '\.d\.ts$' \
            | grep -v 'jest\.' \
            | sed 's|^frontend/||' || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" > /tmp/changed_frontend_src.txt
            echo "has_src=true" >> $GITHUB_OUTPUT
          else
            touch /tmp/changed_frontend_src.txt
            echo "has_src=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Jest tests
        working-directory: frontend
        run: |
          if [ -s /tmp/changed_frontend_src.txt ]; then
            COVERAGE_FROM=$(jq -R . /tmp/changed_frontend_src.txt | jq -s -c .)
            npx jest --ci --forceExit \
              --coverage \
              --coverageReporters=json-summary \
              --coverageReporters=text \
              --collectCoverageFrom="$COVERAGE_FROM"
          else
            npx jest --ci --forceExit
          fi

      - name: Comment frontend coverage on PR
        if: steps.changed.outputs.has_src == 'true'
        uses: MishaKav/jest-coverage-comment@40d7aed38d0fbaea266c34c12ab06356eec894eb # v1.0.33
        with:
          title: Frontend coverage (changed files)
          coverage-summary-path: frontend/coverage/coverage-summary.json
          unique-id-for-comment: frontend

      - name: Enforce 80% coverage on changed files
        if: steps.changed.outputs.has_src == 'true'
        working-directory: frontend
        run: |
          FAILED=0
          while IFS= read -r relPath; do
            [ -z "$relPath" ] && continue

            HAS_DATA=$(jq -r --arg p "$relPath" \
              '[to_entries[] | select(.key != "total" and (.key | endswith("/" + $p)))] | length' \
              coverage/coverage-summary.json)

            if [ "$HAS_DATA" = "0" ]; then
              echo "FAIL: $relPath — no coverage data (no tests cover this file)"
              FAILED=1
              continue
            fi

            jq -r --arg p "$relPath" '
              to_entries[] |
              select(.key != "total" and (.key | endswith("/" + $p))) |
              .value |
              to_entries[] |
              select(.value.total > 0 and .value.pct < 80) |
              "FAIL: \($p) — \(.key) \(.value.pct)% < 80%"
            ' coverage/coverage-summary.json | tee /tmp/coverage_fail.txt

            if [ -s /tmp/coverage_fail.txt ]; then
              FAILED=1
            else
              echo "OK: $relPath"
            fi
          done < /tmp/changed_frontend_src.txt

          [ "$FAILED" = "0" ] || { echo "Coverage check failed."; exit 1; }
          echo "All changed files meet the 80% coverage threshold."

      - name: Install selenium-side-runner
        run: npm install -g selenium-side-runner

      - name: Run Selenium tests (Login + Registro)
        run: |
          selenium-side-runner \
            --timeout 60000 \
            --filter '^(login|registro)_' \
            -c "browserName=chrome goog:chromeOptions.args=[--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1280,1000]" \
            frontend/web-mobile-project.side

      - name: Run Selenium tests (Anamnese, non-blocking)
        continue-on-error: true
        run: |
          selenium-side-runner \
            --timeout 60000 \
            --filter '^anamnese_' \
            -c "browserName=chrome goog:chromeOptions.args=[--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1280,1000]" \
            frontend/web-mobile-project.side
